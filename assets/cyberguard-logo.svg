<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="CyberGuard">
  <defs>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Hex clip -->
    <clipPath id="shieldClip">
      <path d="M40 6 L58 14 L58 36 Q58 52 40 62 Q22 52 22 36 L22 14 Z" />
    </clipPath>
  </defs>

  <!-- ── Shield Icon ── -->
  <!-- Shield outer fill -->
  <path d="M40 6 L58 14 L58 36 Q58 52 40 62 Q22 52 22 36 L22 14 Z"
        fill="url(#shieldGrad)" filter="url(#glow)" />
  <!-- Shield inner dark panel -->
  <path d="M40 12 L54 19 L54 36 Q54 49 40 57 Q26 49 26 36 L26 19 Z"
        fill="#0f172a" opacity="0.7" />
  <!-- Circuit lines inside shield -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.6">
    <line x1="33" y1="28" x2="47" y2="28" />
    <line x1="33" y1="34" x2="47" y2="34" />
    <line x1="33" y1="40" x2="47" y2="40" />
    <line x1="33" y1="28" x2="33" y2="40" />
    <line x1="47" y1="28" x2="47" y2="40" />
  </g>
  <!-- Lock icon in shield center -->
  <rect x="35" y="34" width="10" height="8" rx="1.5" fill="#38bdf8" opacity="0.95" />
  <path d="M37 34 Q37 29 40 29 Q43 29 43 34" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" />
  <!-- Lock keyhole -->
  <circle cx="40" cy="38" r="1.2" fill="#0f172a" />

  <!-- ── Wordmark ── -->
  <!-- CYBER -->
  <text x="72" y="36"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="1.5"
        fill="#e2e8f0">CYBER</text>
  <!-- GUARD — accent colour -->
  <text x="72" y="58"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="1.5"
        fill="url(#shieldGrad)">GUARD</text>

  <!-- Thin divider line between wordmark lines -->
  <line x1="72" y1="42" x2="230" y2="42" stroke="#334155" stroke-width="0.8" />

  <!-- Tagline -->
  <text x="72" y="72"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-weight="400"
        font-size="8.5"
        letter-spacing="3"
        fill="#64748b">SECURITY AWARENESS PLATFORM</text>
</svg>
