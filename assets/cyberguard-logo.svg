<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80" role="img" aria-label="CyberGuard">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF"/>
      <stop offset="100%" style="stop-color:#0057B8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C6FF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dark shadow for white CYBER text — readable on any bg -->
    <filter id="textShadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0A0E1A" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Dark background pill — ensures logo is readable on white or light backgrounds -->
  <rect x="0" y="0" width="340" height="80" rx="8" fill="#0D1421" opacity="0.0" id="logo-bg"/>
  <!-- Wordmark background area (subtle dark tint, works on light pages) -->
  <rect x="76" y="4" width="258" height="72" rx="6" fill="#0D1421" opacity="0.06"/>

  <!-- ── Hexagon Badge ── -->
  <!-- Outer hex fill (dark navy) -->
  <polygon points="40,4 68,20 68,52 40,68 12,52 12,20"
           fill="#0A0E1A" stroke="url(#hexGrad)" stroke-width="2"/>

  <!-- Radar arcs (threat detection motif) -->
  <!-- Outer arc -->
  <path d="M 22 36 A 18 18 0 0 1 58 36"
        fill="none" stroke="#00C6FF" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <!-- Mid arc -->
  <path d="M 28 36 A 12 12 0 0 1 52 36"
        fill="none" stroke="#00C6FF" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Inner arc -->
  <path d="M 33 36 A 7 7 0 0 1 47 36"
        fill="none" stroke="#00C6FF" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>

  <!-- Crosshair lines -->
  <line x1="40" y1="14" x2="40" y2="58" stroke="#00C6FF" stroke-width="0.8" opacity="0.25"/>
  <line x1="18" y1="36" x2="62" y2="36" stroke="#00C6FF" stroke-width="0.8" opacity="0.25"/>

  <!-- Scan line (diagonal, motion feel) -->
  <line x1="22" y1="52" x2="58" y2="20"
        stroke="url(#hexGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>

  <!-- Center target dot -->
  <circle cx="40" cy="36" r="3.5" fill="#00C6FF" filter="url(#softGlow)"/>
  <circle cx="40" cy="36" r="1.5" fill="#ffffff"/>

  <!-- Tick marks on hex edge at cardinal points -->
  <line x1="40" y1="4"  x2="40" y2="10" stroke="#00C6FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="62" x2="40" y2="68" stroke="#00C6FF" stroke-width="1.5" opacity="0.7"/>

  <!-- ── Wordmark ── -->
  <!-- CYBER — dark stroke behind + white fill = readable on any bg -->
  <text x="82" y="34"
        font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="21"
        letter-spacing="2"
        stroke="#0D1421" stroke-width="4" stroke-linejoin="round"
        paint-order="stroke fill"
        fill="#FFFFFF">CYBER</text>

  <!-- GUARD — gradient -->
  <text x="82" y="57"
        font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="21"
        letter-spacing="2"
        fill="url(#textGrad)">GUARD</text>

  <!-- Vertical accent bar between icon and wordmark -->
  <rect x="75" y="10" width="2" height="56" rx="1" fill="url(#hexGrad)" opacity="0.6"/>

  <!-- Thin rule under CYBER -->
  <line x1="82" y1="40" x2="238" y2="40" stroke="#1E2D4A" stroke-width="1"/>

  <!-- Tagline -->
  <text x="82" y="70"
        font-family="'Segoe UI', Arial, sans-serif"
        font-weight="400"
        font-size="8"
        letter-spacing="3.5"
        fill="#4A6080">SECURITY AWARENESS PLATFORM</text>
</svg>
