<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 76" width="360" height="76" role="img" aria-label="CyberGuard">
  <defs>
    <linearGradient id="shieldBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#112236"/>
      <stop offset="100%" style="stop-color:#091520"/>
    </linearGradient>
    <linearGradient id="shieldPlate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1A3550"/>
      <stop offset="100%" style="stop-color:#0F2338"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#00C8F0"/>
      <stop offset="100%" style="stop-color:#005580"/>
    </linearGradient>
  </defs>

  <!-- ══ SHIELD ══════════════════════════════════════════════════════ -->

  <!-- Drop shadow layer -->
  <path d="M38 7 L65 15 L65 42 Q65 62 38 73 Q11 62 11 42 L11 15 Z"
        fill="#000" opacity="0.25" transform="translate(1.5,2)"/>

  <!-- Main shield body -->
  <path d="M38 7 L65 15 L65 42 Q65 62 38 73 Q11 62 11 42 L11 15 Z"
        fill="url(#shieldBody)" stroke="url(#strokeGrad)" stroke-width="1.8"/>

  <!-- Chamfered top-left corner accent -->
  <line x1="11" y1="22" x2="18" y2="15" stroke="#00C8F0" stroke-width="1" opacity="0.6"/>
  <!-- Chamfered top-right corner accent -->
  <line x1="65" y1="22" x2="58" y2="15" stroke="#00C8F0" stroke-width="1" opacity="0.6"/>

  <!-- Armor plate — horizontal band across top third -->
  <path d="M13 22 L63 22" stroke="#1E4060" stroke-width="1"/>
  <path d="M14 24 L62 24" stroke="#00C8F0" stroke-width="0.5" opacity="0.3"/>

  <!-- Inner inset shield border -->
  <path d="M38 12 L60 19 L60 42 Q60 58 38 68 Q16 58 16 42 L16 19 Z"
        fill="none" stroke="#1A3A58" stroke-width="1"/>

  <!-- Subtle diagonal crosshatch inside shield (lower panel) -->
  <clipPath id="shieldClip">
    <path d="M38 12 L60 19 L60 42 Q60 58 38 68 Q16 58 16 42 L16 19 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClip)" opacity="0.06">
    <line x1="0"  y1="20" x2="80" y2="80" stroke="#00C8F0" stroke-width="1"/>
    <line x1="10" y1="20" x2="80" y2="70" stroke="#00C8F0" stroke-width="1"/>
    <line x1="20" y1="20" x2="80" y2="60" stroke="#00C8F0" stroke-width="1"/>
    <line x1="30" y1="20" x2="80" y2="50" stroke="#00C8F0" stroke-width="1"/>
    <line x1="0"  y1="30" x2="80" y2="90" stroke="#00C8F0" stroke-width="1"/>
    <line x1="0"  y1="40" x2="60" y2="90" stroke="#00C8F0" stroke-width="1"/>
    <line x1="0"  y1="50" x2="50" y2="90" stroke="#00C8F0" stroke-width="1"/>
  </g>

  <!-- Outer bullseye ring with tick marks -->
  <circle cx="38" cy="42" r="17" fill="none" stroke="#1B3E5E" stroke-width="1.2"/>
  <!-- 8 tick marks on outer ring -->
  <line x1="38" y1="25" x2="38" y2="28" stroke="#00C8F0" stroke-width="1" opacity="0.7"/>
  <line x1="38" y1="56" x2="38" y2="59" stroke="#00C8F0" stroke-width="1" opacity="0.7"/>
  <line x1="21" y1="42" x2="24" y2="42" stroke="#00C8F0" stroke-width="1" opacity="0.7"/>
  <line x1="52" y1="42" x2="55" y2="42" stroke="#00C8F0" stroke-width="1" opacity="0.7"/>
  <!-- Diagonal ticks -->
  <line x1="25.9" y1="29.9" x2="28" y2="32" stroke="#00C8F0" stroke-width="0.8" opacity="0.4"/>
  <line x1="50.1" y1="29.9" x2="48" y2="32" stroke="#00C8F0" stroke-width="0.8" opacity="0.4"/>
  <line x1="25.9" y1="54.1" x2="28" y2="52" stroke="#00C8F0" stroke-width="0.8" opacity="0.4"/>
  <line x1="50.1" y1="54.1" x2="48" y2="52" stroke="#00C8F0" stroke-width="0.8" opacity="0.4"/>

  <!-- Mid ring -->
  <circle cx="38" cy="42" r="10" fill="none" stroke="#1E4A6E" stroke-width="1.2"/>

  <!-- Inner ring (cyan) -->
  <circle cx="38" cy="42" r="5"  fill="none" stroke="#00C8F0" stroke-width="1.5"/>

  <!-- Circuit traces — L-shaped routes with dual nodes -->
  <!-- Top route -->
  <polyline points="38,37 38,31 43,31" fill="none" stroke="#00C8F0" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38" cy="31" r="1.4" fill="#00C8F0" opacity="0.8"/>
  <circle cx="43" cy="31" r="1.8" fill="#00C8F0" opacity="0.9"/>

  <!-- Bottom route -->
  <polyline points="38,47 38,53 33,53" fill="none" stroke="#00C8F0" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38" cy="53" r="1.4" fill="#00C8F0" opacity="0.8"/>
  <circle cx="33" cy="53" r="1.8" fill="#00C8F0" opacity="0.9"/>

  <!-- Left route -->
  <polyline points="33,42 27,42 27,37" fill="none" stroke="#00C8F0" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="27" cy="42" r="1.4" fill="#00C8F0" opacity="0.8"/>
  <circle cx="27" cy="37" r="1.8" fill="#00C8F0" opacity="0.9"/>

  <!-- Right route -->
  <polyline points="43,42 49,42 49,47" fill="none" stroke="#00C8F0" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="49" cy="42" r="1.4" fill="#00C8F0" opacity="0.8"/>
  <circle cx="49" cy="47" r="1.8" fill="#00C8F0" opacity="0.9"/>

  <!-- Center crosshair diamond -->
  <polygon points="38,39 41,42 38,45 35,42" fill="none" stroke="#00E5FF" stroke-width="1.2"/>
  <circle cx="38" cy="42" r="1.5" fill="#00E5FF"/>

  <!-- Corner bracket accents (outside shield, top corners) -->
  <g stroke="#00C8F0" stroke-width="1.2" opacity="0.5" stroke-linecap="square">
    <!-- Top-left bracket -->
    <polyline points="7,11 7,7 11,7"/>
    <!-- Top-right bracket -->
    <polyline points="65,11 65,7 69,7"/>
  </g>

  <!-- ══ WORDMARK ══════════════════════════════════════════════════════ -->

  <!-- Thin separator bar -->
  <rect x="82" y="8" width="1.5" height="58" rx="0.75" fill="#1E4060"/>

  <!-- CYBERGUARD — single line, two-tone, geometric bold -->
  <!-- CYBER in dark navy (readable on white), GUARD in cyan -->
  <text y="40"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="26"
        letter-spacing="1">
    <tspan x="92" fill="#0F2A45" letter-spacing="1">CYBER</tspan><tspan fill="url(#cyanGrad)" letter-spacing="1">GUARD</tspan>
  </text>

  <!-- Underline accent under full wordmark -->
  <rect x="92" y="44" width="246" height="1.5" rx="0.75" fill="url(#cyanGrad)" opacity="0.35"/>

  <!-- Tagline -->
  <text x="93" y="60"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400"
        font-size="7.8"
        letter-spacing="4"
        fill="#4A7090">SECURITY AWARENESS PLATFORM</text>

  <!-- Tagline separator dots -->
  <text x="92" y="70"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="300"
        font-size="6.5"
        letter-spacing="5"
        fill="#2A5070" opacity="0.6">● ASEAN  ●  APAC  ●  GLOBAL</text>
</svg>
