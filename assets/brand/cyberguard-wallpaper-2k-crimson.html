<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CyberGuard — 2K Wallpaper (Crimson)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:2560px; height:1440px; overflow:hidden; background:#0C0408; }
  canvas { position:absolute; top:0; left:0; }
  .overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
</style>
</head>
<body>

<canvas id="bg" width="2560" height="1440"></canvas>

<div class="overlay">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 76" width="1080" height="228" style="margin-bottom:40px;filter:drop-shadow(0 0 30px #FF203088)">
    <defs>
      <linearGradient id="shieldBody" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   style="stop-color:#2A0E14"/>
        <stop offset="100%" style="stop-color:#150608"/>
      </linearGradient>
      <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   style="stop-color:#FF3040"/>
        <stop offset="100%" style="stop-color:#CC0020"/>
      </linearGradient>
      <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%"   style="stop-color:#FF4050"/>
        <stop offset="100%" style="stop-color:#800010"/>
      </linearGradient>
    </defs>
    <path d="M38 7 L65 15 L65 42 Q65 62 38 73 Q11 62 11 42 L11 15 Z" fill="#000" opacity="0.35" transform="translate(1.5,2)"/>
    <path d="M38 7 L65 15 L65 42 Q65 62 38 73 Q11 62 11 42 L11 15 Z" fill="url(#shieldBody)" stroke="url(#strokeGrad)" stroke-width="1.8"/>
    <line x1="11" y1="22" x2="18" y2="15" stroke="#FF4050" stroke-width="1" opacity="0.6"/>
    <line x1="65" y1="22" x2="58" y2="15" stroke="#FF4050" stroke-width="1" opacity="0.6"/>
    <path d="M13 22 L63 22" stroke="#601020" stroke-width="1"/>
    <path d="M38 12 L60 19 L60 42 Q60 58 38 68 Q16 58 16 42 L16 19 Z" fill="none" stroke="#581020" stroke-width="1"/>
    <circle cx="38" cy="42" r="17" fill="none" stroke="#5C1018" stroke-width="1.2"/>
    <line x1="38" y1="25" x2="38" y2="28" stroke="#FF4050" stroke-width="1" opacity="0.7"/>
    <line x1="38" y1="56" x2="38" y2="59" stroke="#FF4050" stroke-width="1" opacity="0.7"/>
    <line x1="21" y1="42" x2="24" y2="42" stroke="#FF4050" stroke-width="1" opacity="0.7"/>
    <line x1="52" y1="42" x2="55" y2="42" stroke="#FF4050" stroke-width="1" opacity="0.7"/>
    <circle cx="38" cy="42" r="10" fill="none" stroke="#701520" stroke-width="1.2"/>
    <circle cx="38" cy="42" r="5"  fill="none" stroke="#FF4050" stroke-width="1.5"/>
    <polyline points="38,37 38,31 43,31" fill="none" stroke="#FF4050" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="38" cy="31" r="1.4" fill="#FF4050" opacity="0.8"/>
    <circle cx="43" cy="31" r="1.8" fill="#FF4050" opacity="0.9"/>
    <polyline points="38,47 38,53 33,53" fill="none" stroke="#FF4050" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="38" cy="53" r="1.4" fill="#FF4050" opacity="0.8"/>
    <circle cx="33" cy="53" r="1.8" fill="#FF4050" opacity="0.9"/>
    <polyline points="33,42 27,42 27,37" fill="none" stroke="#FF4050" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="27" cy="42" r="1.4" fill="#FF4050" opacity="0.8"/>
    <circle cx="27" cy="37" r="1.8" fill="#FF4050" opacity="0.9"/>
    <polyline points="43,42 49,42 49,47" fill="none" stroke="#FF4050" stroke-width="0.9" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="49" cy="42" r="1.4" fill="#FF4050" opacity="0.8"/>
    <circle cx="49" cy="47" r="1.8" fill="#FF4050" opacity="0.9"/>
    <polygon points="38,39 41,42 38,45 35,42" fill="none" stroke="#FF3040" stroke-width="1.2"/>
    <circle cx="38" cy="42" r="1.5" fill="#FF3040"/>
    <g stroke="#FF4050" stroke-width="1.2" opacity="0.5" stroke-linecap="square">
      <polyline points="7,11 7,7 11,7"/>
      <polyline points="65,11 65,7 69,7"/>
    </g>
    <rect x="82" y="8" width="1.5" height="58" rx="0.75" fill="#601020"/>
    <text y="40" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="26" letter-spacing="1">
      <tspan x="92" fill="#FFFFFF" letter-spacing="1">CYBER</tspan><tspan fill="url(#crimsonGrad)" letter-spacing="1">GUARD</tspan>
    </text>
    <rect x="92" y="44" width="246" height="1.5" rx="0.75" fill="url(#crimsonGrad)" opacity="0.35"/>
    <text x="93" y="60" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="7.8" letter-spacing="4" fill="#804040">SECURITY AWARENESS PLATFORM</text>
    <text x="92" y="70" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-weight="300" font-size="6.5" letter-spacing="5" fill="#502030" opacity="0.6">● ASEAN  ●  APAC  ●  GLOBAL</text>
  </svg>

  <div style="font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:36px;font-weight:300;letter-spacing:16px;color:#804040;text-transform:uppercase;margin-bottom:28px;">
    CYBER RESILIENCE AT GLOBAL SCALE
  </div>
  <div style="width:700px;height:1px;background:linear-gradient(90deg,transparent,#FF3040,transparent);"></div>

  <div style="position:absolute;bottom:50px;font-family:'Segoe UI',sans-serif;font-size:20px;font-weight:300;letter-spacing:8px;color:#501825;">
    CYBERGUARD.IVANTHAN.UK
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const W = 2560, H = 1440;

const bg = ctx.createRadialGradient(W/2, H/2, 150, W/2, H/2, 1200);
bg.addColorStop(0,   '#160608');
bg.addColorStop(0.5, '#0E0405');
bg.addColorStop(1,   '#0C0408');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

function drawHex(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    i === 0 ? ctx.moveTo(cx + r*Math.cos(a), cy + r*Math.sin(a))
            : ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
  }
  ctx.closePath(); ctx.stroke();
}
ctx.strokeStyle = 'rgba(220,50,60,0.04)';
ctx.lineWidth = 1.5;
const hr = 60, hh = hr * Math.sqrt(3);
for (let row = -1; row < H/hh+2; row++)
  for (let col = -1; col < W/(hr*1.5)+2; col++)
    drawHex(col*hr*3+(row%2===0?0:hr*1.5), row*hh, hr);

ctx.strokeStyle = 'rgba(220,50,60,0.01)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x+=4) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

function drawTrace(points, opacity) {
  ctx.strokeStyle = `rgba(220,50,60,${opacity})`;
  ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(points[0][0], points[0][1]);
  for (let i=1;i<points.length;i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();
  for (const [x,y] of points) {
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,60,70,${opacity*1.5})`; ctx.fill();
  }
}
drawTrace([[0,270],[120,270],[120,400],[270,400],[270,470],[400,470]],0.18);
drawTrace([[0,540],[160,540],[160,610],[340,610]],0.14);
drawTrace([[0,800],[220,800],[220,670],[400,670],[400,740],[540,740]],0.12);
drawTrace([[0,1070],[130,1070],[130,1000],[300,1000],[300,940],[470,940]],0.16);
drawTrace([[2560,270],[2440,270],[2440,400],[2290,400],[2290,470],[2160,470]],0.18);
drawTrace([[2560,540],[2400,540],[2400,610],[2220,610]],0.14);
drawTrace([[2560,800],[2340,800],[2340,670],[2160,670],[2160,740],[2020,740]],0.12);
drawTrace([[2560,1070],[2430,1070],[2430,1000],[2260,1000],[2260,940],[2090,940]],0.16);

function glow(x,y,r,color,alpha) {
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, color.replace('alpha',String(alpha)));
  g.addColorStop(0.4, color.replace('alpha',String(alpha*0.3)));
  g.addColorStop(1, color.replace('alpha','0'));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}
glow(W/2,H/2,600,'rgba(160,20,30,alpha)',0.30);
glow(W/2,H/2,260,'rgba(220,50,60,alpha)',0.15);
glow(270,270,400,'rgba(120,10,20,alpha)',0.18);
glow(W-270,H-270,400,'rgba(100,8,15,alpha)',0.14);
glow(200,H-200,330,'rgba(80,0,60,alpha)',0.08);

ctx.fillStyle='rgba(255,60,70,0.35)';
for (let i=0;i<300;i++) {
  const x=Math.random()*W, y=Math.random()*H;
  const dist=Math.sqrt(Math.pow(x-W/2,2)+Math.pow(y-H/2,2));
  ctx.globalAlpha=Math.max(0,0.35-dist/2000);
  ctx.beginPath(); ctx.arc(x,y,Math.random()*2+0.5,0,Math.PI*2); ctx.fill();
}
ctx.globalAlpha=1;

ctx.strokeStyle='rgba(220,50,60,0.35)';
ctx.lineWidth=2.5; ctx.lineCap='square';
const bL=80;
ctx.beginPath(); ctx.moveTo(30,30+bL); ctx.lineTo(30,30); ctx.lineTo(30+bL,30); ctx.stroke();
ctx.beginPath(); ctx.moveTo(W-30-bL,30); ctx.lineTo(W-30,30); ctx.lineTo(W-30,30+bL); ctx.stroke();
ctx.beginPath(); ctx.moveTo(30,H-30-bL); ctx.lineTo(30,H-30); ctx.lineTo(30+bL,H-30); ctx.stroke();
ctx.beginPath(); ctx.moveTo(W-30-bL,H-30); ctx.lineTo(W-30,H-30); ctx.lineTo(W-30,H-30-bL); ctx.stroke();

ctx.strokeStyle='rgba(220,50,60,0.2)'; ctx.lineWidth=1.5;
for (let i=1;i<=4;i++) {
  ctx.beginPath(); ctx.moveTo(30+i*20,30); ctx.lineTo(30+i*20,42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,30+i*20); ctx.lineTo(42,30+i*20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-30-i*20,30); ctx.lineTo(W-30-i*20,42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-30,30+i*20); ctx.lineTo(W-42,30+i*20); ctx.stroke();
}

ctx.font='14px monospace'; ctx.fillStyle='rgba(200,40,50,0.07)';
const chars='01アイウエオカキクケコ';
for (let col=0;col<10;col++) for (let row=0;row<25;row++) {
  const c=chars[Math.floor(Math.random()*chars.length)];
  ctx.fillText(c,45+col*18,130+row*22);
  ctx.fillText(c,W-220+col*18,130+row*22);
}
</script>
</body>
</html>
